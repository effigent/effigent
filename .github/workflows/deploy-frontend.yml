name: Deploy site

# Deploys the marketing site (Next.js static export) to S3 + CloudFront.
# The dashboard is a full-stack Next.js app and deploys to Vercel (not here).
# Auth: AWS access-key secrets under the `prod` environment.

on:
  push:
    branches: [main]
    paths:
      - 'packages/site/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  site:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run -w @ccopt/site build
        env:
          # Real endpoints, injected at build time (GitHub → Settings → Environments →
          # prod → Variables). Unset → snippets show an explicit <placeholder>.
          NEXT_PUBLIC_COLLECTOR_URL: ${{ vars.COLLECTOR_URL }}
          NEXT_PUBLIC_DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Sync to S3
        run: |
          # Next.js static export outputs to out/. Assets (_next/*) are hashed →
          # cache forever; HTML is entry-point → never cache.
          aws s3 sync packages/site/out "s3://${{ vars.SITE_BUCKET }}" \
            --delete --exclude "*.html" --exclude "icon*" --exclude "logo_*" \
            --cache-control "public,max-age=31536000,immutable"
          # entry-point files with stable URLs (html, favicon, logos) — never cache hard
          aws s3 sync packages/site/out "s3://${{ vars.SITE_BUCKET }}" \
            --exclude "*" --include "*.html" --include "icon*" --include "logo_*" \
            --cache-control "no-cache"
      - name: Publish extensionless routes
        run: |
          # CloudFront only resolves the ROOT default object — /pricing does not
          # map to pricing/index.html and 403s. Publish each subpage's HTML at
          # the bare key too, so /pricing, /developers, … serve directly.
          for f in packages/site/out/*/index.html; do
            d=$(basename "$(dirname "$f")")
            case "$d" in _next|404) continue;; esac
            aws s3 cp "$f" "s3://${{ vars.SITE_BUCKET }}/$d" \
              --content-type "text/html" --cache-control "no-cache"
          done
      - name: Invalidate CloudFront
        if: ${{ vars.SITE_DISTRIBUTION_ID != '' }}
        continue-on-error: true
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.SITE_DISTRIBUTION_ID }}" --paths "/*"
